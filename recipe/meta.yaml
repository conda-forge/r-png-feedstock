{% set version = "0.1-9" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-png
  version: {{ version|replace("-", "_") }}

source:
  fn: png_{{ version }}.tar.gz
  url:
    - {{ cran_mirror }}/src/contrib/png_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/png/png_{{ version }}.tar.gz
  sha256: 0b8502363c6f5c73cf284dee4fd1416f5adf4115b6ae9a1e09531c143b978589

build:
  number: 0
  skip: true  # [win32]
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - cross-r-base {{ r_base }}  # [build_platform != target_platform]
    - {{ compiler('c') }}        # [not win]
    - {{ stdlib("c") }}          # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}gzip              # [win]
    - {{ posix }}tar               # [win]
  host:
    - r-base
    - libpng   # [not win]
    - zlib
  run:
    - r-base

test:
  commands:
    - $R -e "library('png')"           # [not win]
    - "\"%R%\" -e \"library('png')\""  # [win]

about:
  home: http://www.rforge.net/png/
  license: GPL-2.0-only OR GPL-3.0-only
  summary: This package provides an easy and simple way to read, write and display bitmap images stored in the PNG format. It can read and write both files and in-memory raw vectors.
  license_family: GPL3
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
